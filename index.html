<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bayshore Realty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0a0d14;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      position: fixed;
      width: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Playfair Display';
      color: gold;
      font-size: 22px;
    }

    nav a {
      margin-left: 25px;
      color: #ccc;
      text-decoration: none;
    }

    .hero {
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c');
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Playfair Display';
      font-size: 70px;
    }

    .section {
      padding: 100px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
      gap: 30px;
    }

    .card {
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .price {
      font-size: 22px;
      color: gold;
    }

    .cta {
      text-align: center;
      padding: 100px;
      background: #111;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Bayshore Realty</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Properties</a>
    <a href="#">Agents</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Luxury Real Estate</h1>
    <p>Find your dream home</p>
  </div>
</section>

<section class="section">
  <h2>Featured Listings</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994">
      <div class="card-content">
        <div class="price">$2,500,000</div>
        <p>Miami Beach • 5 Beds • 4 Baths • 5000 sqft</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
      <div class="card-content">
        <div class="price">$1,800,000</div>
        <p>Modern House • 4 Beds • 3 Baths • 3500 sqft</p>
      </div>
    </div>

  </div>
</section>

<section class="cta">
  <h2>Schedule a Private Tour</h2>
  <p>Contact our agents today</p>
</section>

<footer>
  © 2026 Bayshore Realty
</footer>

</body>
</html>
